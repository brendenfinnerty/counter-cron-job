name: Increment Counter

on:
  schedule:
    - cron: '0 */8 * * *'  # runs every 8 hours (3x/day)
  workflow_dispatch:  # lets you trigger it manually for testing

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Increment counter
        run: |
          count=$(cat counter.txt)
          echo $((count + 1)) > counter.txt

      - name: Commit and push
        run: |
          git config user.name "counter-bot"
          git config user.email "bot@users.noreply.github.com"
          git add counter.txt
          git commit -m "Increment counter to $(cat counter.txt)"
          git push
